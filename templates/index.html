<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ challenge.name }} - CTF Challenge</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚩 {{ challenge.name }}</h1>
        </header>

        <section class="image-section">
            <img src="{{ url_for('static', filename='challenge.png') }}" alt="Challenge Image" class="challenge-image">
        </section>

        <section class="download-section">
            <a href="/download" class="btn btn-primary" download>
                📥 Download Challenge Image
            </a>
        </section>
    </div>
</body>
</html>
